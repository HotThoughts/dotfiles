[cship]
lines = [
  """
  $kubernetes\
  $directory\
  $custom.jj\
  $python\
  $nodejs\
  $helm\
  $rust
  """,
  """
  $cship.model $cship.agent"\
  $cship.context_bar $cship.cost $cship.usage_limits
  """
]

[cship.model]
symbol = " "
style  = "bold fg:#7aa2f7"

[cship.agent]
symbol = "󰘍 "
style  = "fg:#9ece6a"

[cship.context_bar]
symbol             = " "
filled_char        = "●"
empty_char         = "○"
format             = "[$symbol$value]($style)"
width              = 10
style              = "fg:#7dcfff"
warn_threshold     = 40.0
warn_style         = "fg:#e0af68"
critical_threshold = 70.0
critical_style     = "bold fg:#f7768e"

[cship.cost]
symbol             = " "
style              = "fg:#a9b1d6"
warn_threshold     = 2.0
warn_style         = "fg:#e0af68"
critical_threshold = 5.0
critical_style     = "bold fg:#f7768e"

[cship.usage_limits]
five_hour_format   = " 5h {pct}%"
seven_day_format   = "󰨳 7d {pct}%"
separator          = " "
warn_threshold     = 70.0
warn_style         = "fg:#e0af68"
critical_threshold = 90.0
critical_style     = "bold fg:#f7768e"

[custom.jj]
when = "jj-starship detect"
shell = ["jj-starship"]
format = "$output "

